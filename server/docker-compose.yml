services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads

  db:
    image: postgres:latest
    env_file: .env
    environment:
      POSTGRES_DB: volonti
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/volonti/postgresql/data
    ports:
      - "6565:5432"

volumes:
  pgdata:
  uploads:
